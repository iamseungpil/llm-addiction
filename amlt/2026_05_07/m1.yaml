description: Track B M1 portfolio discriminant (open-weight Gemma+LLaMA)

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - source ~/.profile

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: m1_open_weight
    sku: 80G4-H100
    sla_tier: standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: $$HF_TOKEN
        TRACK: m1
    command:
      - nvidia-smi
      - bash /tmp/amlt-code-download/shared/bootstrap_addiction_node.sh
      - cd /scratch/code/llm-addiction && bash paper_experiments/m1_portfolio_discriminant/amlt/run_grid.sh open_weight
      - cd /scratch/code/llm-addiction && python paper_experiments/m1_portfolio_discriminant/src/analyze_m1.py --portfolio_input_dir /scratch/x3415a02/data/llm-addiction/m1_portfolio/ --gambling_input_dirs /scratch/x3415a02/data/llm-addiction/track0_w3/ --output_path /scratch/x3415a02/data/llm-addiction/m1_portfolio/_analysis.json
      - cd /scratch/code/llm-addiction && python paper_experiments/m1_portfolio_discriminant/src/sanity_checks.py --input_dir /scratch/x3415a02/data/llm-addiction/m1_portfolio/ --output_path /scratch/x3415a02/data/llm-addiction/m1_portfolio/_sanity.md
      - sleep 86400
