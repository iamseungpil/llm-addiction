description: Track 0 W3 Parity Gate (Plan v5.2 §3.5) — gpt-4o-mini Track 0 v6 vs legacy re-run + parity_check

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: track0_parity
    sku: 80G4-H100
    sla_tier: standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: $$HF_TOKEN
        HUGGING_FACE_HUB_TOKEN: $$HF_TOKEN
        OPENAI_API_KEY: $$OPENAI_API_KEY
        TRACK: track0_parity
    command:
      - bash /tmp/amlt-code-download/shared/bootstrap_addiction_node.sh
      - cd /scratch/code/llm-addiction && bash paper_experiments/track0_w3_replication/amlt/run_grid.sh parity
      - sleep 86400
