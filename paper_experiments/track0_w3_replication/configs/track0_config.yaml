# Track 0 (W3 cross-model matched-cap replication) pre-registration config.
# Frozen at Plan v4 commit (2026-05-08). Any change requires §13 deviation note.
# All parameters that affect the primary contrast live here, not in CLI defaults.

stage_1:
  n_games_per_cell: 200
  caps: [10, 30, 50, 70]
  modes: [fixed, variable]
  models:
    open_weight:
      - {name: gemma, hf_id: google/gemma-2-9b-it, layers_extracted: false}
      - {name: llama, hf_id: meta-llama/Llama-3.1-8B-Instruct, layers_extracted: false}
    api:
      - {name: gpt-4o-mini, sdk: openai, model_id: gpt-4o-mini}
      - {name: claude-haiku, sdk: anthropic, model_id: claude-3-5-haiku-20241022}
      - {name: gemini-flash, sdk: google, model_id: gemini-2.5-flash}
      - {name: gpt-4o, sdk: openai, model_id: gpt-4o}  # re-baseline for protocol parity

stage_2:
  trigger:
    primary_ci_borderline_lower_bound: [-0.005, 0.01]
    primary_ci_halfwidth_max_logit: 0.025
  n_games_per_cell: 500

api:
  inter_call_gap_s: 0.2

generation:
  initial_balance: 100
  win_rate: 0.30
  payout: 3.0
  # Legacy SM parity (per-mode): the legacy GPT runners use different round caps.
  # Fixed-bet runner: legacy/gpt_fixed_bet_size_experiment/src/gpt_fixed_bet_size_experiment.py:120 (100 rounds)
  # Variable-bet runner: legacy/gpt_variable_max_bet_experiment/src/gpt_variable_max_bet_experiment.py:120 (50 rounds, "REDUCED from 100 to 50 for efficiency")
  max_rounds_fixed: 100
  max_rounds_variable: 50
  seed_base: 42

bambi_fit:
  # Track 0 W3 Plan v5.2 §8: use random intercept per model only (random slopes
  # under-identified at K=6 models) and read out the contrast as a posterior
  # quantile rather than a Wald CI.
  formula: "bankrupt ~ C(condition) * C(cap) + (1 | model)"
  family: bernoulli
  draws: 2000
  tune: 1000
  chains: 4
  cores: 4
  random_seed: 42
  cluster_se_groups: ["model", "game_id"]

primary_contrast:
  estimand: "marginal P(bankrupt | variable, cap=70) - P(bankrupt | fixed, cap=70)"
  scale: logit
  decision_rule: "lower 2.5% posterior quantile of beta_primary > 0"

qualitative_secondary:
  # The Plan v5.2 §8 signature is the conjunction of two structural facts:
  # (i) at cap=70 variable, the within-model bet/cap fraction exceeds
  #     `signature.bet_cap_fraction_threshold`, AND
  # (ii) the variable / fixed mean total_rounds ratio at cap=70 exceeds
  #     `signature.round_ratio_threshold`.
  # We require `signature.min_models_passing` of 6 models to satisfy both.
  rule: ">=signature.min_models_passing of 6 models meet bet_cap_fraction>signature.bet_cap_fraction_threshold AND rounds_var/rounds_fix>signature.round_ratio_threshold at cap=70"

signature:
  # Plan v5.2 §8 signature thresholds. These are the values the qualitative
  # secondary rule reads out — keep them config-driven so a future tightening
  # does not require a code change.
  bet_cap_fraction_threshold: 0.5
  round_ratio_threshold: 5.0
  min_models_passing: 4

output:
  base_dir: /scratch/x3415a02/data/llm-addiction/track0_w3/
  filename_pattern: "final_{model}_cap{cap}_{mode}_{timestamp}.json"
